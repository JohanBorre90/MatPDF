<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAS-opskrifter – Matematik A</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
    }

    /* SIDEBAR */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: #16213e;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f3460;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 16px 14px 12px;
      background: #0f3460;
      border-bottom: 1px solid #1a4a7a;
      flex-shrink: 0;
    }

    #sidebar-header h1 { font-size: 14px; font-weight: 700; color: #e0e0ff; line-height: 1.3; }
    #sidebar-header p  { font-size: 11px; color: #8899bb; margin-top: 3px; }

    #toc { overflow-y: auto; flex: 1; padding: 8px 0; }
    #toc::-webkit-scrollbar { width: 5px; }
    #toc::-webkit-scrollbar-track { background: #16213e; }
    #toc::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

    .chapter-item { border-bottom: 1px solid #1e2d50; }

    .chapter-link {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 14px; cursor: pointer; font-size: 12.5px; font-weight: 600;
      color: #aac4e8; text-decoration: none; transition: background 0.15s; line-height: 1.35;
    }
    .chapter-link:hover  { background: #1e3a5f; color: #d0e8ff; }
    .chapter-link.active { background: #1e3a5f; color: #7eb8f7; }
    .chapter-link .pg    { font-size: 11px; color: #5577aa; font-weight: 400; margin-left: 8px; flex-shrink: 0; }
    .chapter-link.active .pg { color: #5599cc; }

    .section-list { background: #111827; padding: 2px 0 4px; }

    .section-link {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 14px 5px 24px; cursor: pointer; font-size: 11.5px;
      color: #7799bb; text-decoration: none; transition: background 0.15s; line-height: 1.35;
    }
    .section-link:hover  { background: #1a2d48; color: #aac8e8; }
    .section-link.active { background: #1a3050; color: #7eb8f7; }
    .section-link .pg    { font-size: 10.5px; color: #445566; font-weight: 400; margin-left: 8px; flex-shrink: 0; }
    .section-link.active .pg { color: #5588aa; }

    /* VIEWER */
    #viewer { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #111; min-width: 0; }

    #toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; background: #0f0f1a; border-bottom: 1px solid #222; flex-shrink: 0;
    }

    #toolbar button {
      background: #1e3a5f; border: 1px solid #2a4f7a; color: #aac4e8;
      padding: 5px 11px; border-radius: 4px; cursor: pointer; font-size: 13px;
      transition: background 0.15s; white-space: nowrap;
    }
    #toolbar button:hover:not(:disabled) { background: #2a5080; color: #d0e8ff; }
    #toolbar button:disabled { opacity: 0.35; cursor: default; }
    #toolbar button.active { background: #1a5a9f; border-color: #3a8fdf; color: #d0e8ff; }

    #toolbar input[type=number] {
      width: 52px; background: #1a1a2e; border: 1px solid #2a4f7a;
      color: #d0e0ff; padding: 5px 7px; border-radius: 4px; font-size: 13px; text-align: center;
    }

    #page-info { font-size: 13px; color: #5577aa; }
    #toolbar .sep { width: 1px; background: #2a4f7a; align-self: stretch; margin: 0 2px; }
    #zoom-controls { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    #zoom-controls button { padding: 5px 9px; font-size: 14px; font-weight: bold; }
    #zoom-label { font-size: 12px; color: #7799bb; min-width: 42px; text-align: center; }

    #canvas-container {
      flex: 1; overflow: auto; display: flex;
      justify-content: center; align-items: flex-start;
      padding: 16px; background: #666;
    }
    #canvas-container::-webkit-scrollbar { width: 8px; height: 8px; }
    #canvas-container::-webkit-scrollbar-track { background: #555; }
    #canvas-container::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }

    #pdf-canvas { display: block; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
  </style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <h1>CAS-opskrifter</h1>
    <p>Matematik A &nbsp;·&nbsp; 2020</p>
  </div>
  <div id="toc"></div>
</nav>

<div id="viewer">
  <div id="toolbar">
    <button id="btn-prev">&#8592; Forrige</button>
    <button id="btn-next">Næste &#8594;</button>
    <input type="number" id="page-input" min="1" value="1">
    <span id="page-info">/ –</span>
    <div class="sep"></div>
    <button id="btn-single">Enkeltside</button>
    <button id="btn-book">Bogvisning</button>
    <div id="zoom-controls">
      <button id="btn-zoom-out">&#8722;</button>
      <span id="zoom-label">100%</span>
      <button id="btn-zoom-in">&#43;</button>
      <button id="btn-zoom-fit">Tilpas</button>
    </div>
  </div>
  <div id="canvas-container">
    <canvas id="pdf-canvas"></canvas>
  </div>
</div>

<script>
const PDF_URL = 'CAS-opskrifter_MA_2020-05-24.pdf';

const toc = [
  { chapter: '1. Funktioner (Nspire)', page: 4, sections: [
      { title: '1.1 Definér funktion', page: 4 },
      { title: '1.2 Bestem funktionsværdi', page: 6 },
      { title: '1.3 Tegn graf for funktion', page: 7 },
      { title: '1.4 Find skæringspunkter', page: 10 },
  ]},
  { chapter: '2. Ligninger (Nspire)', page: 11, sections: [
      { title: '2.1 Løs ligning', page: 11 },
      { title: '2.2 Løs to ligninger med to ubekendte', page: 13 },
      { title: '2.3 Isolér ubekendt i ligning', page: 14 },
  ]},
  { chapter: '3. Trigonometri (Nspire/WordMat)', page: 15, sections: [
      { title: '3.1 Kender alle tre sider', page: 15 },
      { title: '3.2 Kender to sider og mellemliggende vinkel', page: 17 },
      { title: '3.3 Kender to vinkler og mellemliggende side', page: 18 },
      { title: '3.4 Kender to vinkler og ikke-mellemliggende side', page: 20 },
      { title: '3.5 Kender to sider og ikke-mellemliggende vinkel', page: 22 },
      { title: '3.6 Kender areal, vinkel og side', page: 24 },
      { title: '3.7 WordMats trekantløser', page: 25 },
  ]},
  { chapter: '4. Vektorer (Nspire)', page: 28, sections: [
      { title: '4.1 Definér vektor', page: 28 },
      { title: '4.2 Bestem længde af vektor', page: 29 },
      { title: '4.3 Bestem skalarprodukt', page: 29 },
      { title: '4.4 Bestem vinkel', page: 31 },
      { title: '4.5 Bestem determinant', page: 32 },
      { title: '4.6 Bestem projektion', page: 33 },
  ]},
  { chapter: '5. Differentialregning (Nspire)', page: 35, sections: [
      { title: '5.1 Differentiér funktion', page: 35 },
      { title: "5.2 Bestem funktionsværdi for f'(x)", page: 38 },
      { title: '5.3 Bestem tangentligning', page: 39 },
      { title: '5.4 Bestem monotoniforhold', page: 40 },
      { title: '5.5 Bestem maks/min (grafisk)', page: 42 },
      { title: '5.6 Bestem maks/min (symbolsk)', page: 46 },
  ]},
  { chapter: '6. Integralregning (Nspire)', page: 48, sections: [
      { title: '6.1 Udregn bestemt integral', page: 48 },
      { title: '6.2 Bestem stamfunktion', page: 50 },
      { title: '6.3 Bestem forskrift for specifik stamfunktion', page: 51 },
      { title: '6.4 Bestem areal (grafisk)', page: 52 },
      { title: '6.5 Bestem areal (symbolsk)', page: 58 },
      { title: '6.6 Bestem rumfang af omdrejningslegeme', page: 63 },
      { title: '6.7 Bestem rumfang af hult omdrejningslegeme', page: 67 },
      { title: '6.8 Bestem kurvelængde', page: 68 },
  ]},
  { chapter: '7. Vektorfunktioner (Nspire)', page: 70, sections: [
      { title: '7.1 Definér vektorfunktion', page: 70 },
      { title: '7.2 Tegn banekurve', page: 70 },
      { title: '7.3 Find skæringspunkter med koordinatakserne', page: 72 },
      { title: '7.4 Undersøg om punkt ligger på banekurve', page: 73 },
      { title: '7.5 Find dobbeltpunkt', page: 74 },
      { title: '7.6 Bestem tangent til banekurve', page: 76 },
      { title: '7.7 Find tangent parallel med linje', page: 79 },
  ]},
  { chapter: '8. Differentialligninger (Nspire)', page: 82, sections: [
      { title: '8.1 Løs differentialligning', page: 82 },
      { title: '8.2 Løs begyndelsesværdiproblem', page: 83 },
      { title: '8.3 Tegn hældningsfelt', page: 85 },
      { title: '8.4 Løs begyndelsesværdiproblem numerisk', page: 86 },
  ]},
  { chapter: '9. Funktioner af to variable (Nspire)', page: 87, sections: [
      { title: '9.1 Definér funktion', page: 87 },
      { title: '9.2 Bestem partielt afledede (1. orden)', page: 88 },
      { title: '9.3 Bestem partielt afledede (2. orden)', page: 89 },
      { title: '9.4 Bestem tangentplan', page: 90 },
      { title: '9.5 Bestem stationære punkter', page: 91 },
      { title: '9.6 Bestem art af stationært punkt', page: 92 },
      { title: '9.7 Tegn graf for funktion af to variable', page: 94 },
      { title: '9.8 Bestem gradient', page: 95 },
      { title: '9.9 Tegn graf (GeoGebra)', page: 96 },
  ]},
  { chapter: '10. Ugrupperet data', page: 97, sections: [
      { title: '10.1 Bestem frekvenser', page: 97 },
      { title: '10.2 Bestem kumulerede frekvenser', page: 98 },
      { title: '10.3 WordMat og ugrupperet data', page: 99 },
  ]},
  { chapter: '11. Grupperet data', page: 101, sections: [
      { title: '11.1 Bestem frekvenser', page: 101 },
      { title: '11.2 Bestem kumulerede frekvenser', page: 102 },
      { title: '11.3 Tegn sumkurve', page: 104 },
      { title: '11.4 Bestem kvartilsæt', page: 107 },
      { title: '11.5 WordMat og grupperet data', page: 108 },
  ]},
  { chapter: '12. Binomialfordelingen', page: 110, sections: [
      { title: '12.1 Bestem binomialsandsynligheder', page: 110 },
      { title: '12.2 Udfør binomialtest', page: 115 },
      { title: '12.3 Bestem konfidensinterval for parameter', page: 119 },
  ]},
  { chapter: '13. Regression (Nspire)', page: 120, sections: [
      { title: '13.1 Udfør regression', page: 120 },
      { title: '13.2 Tegn residualplot', page: 123 },
      { title: '13.3 Bestem residualspredning', page: 124 },
  ]},
  { chapter: '14. Normalfordelingen', page: 126, sections: [
      { title: '14.1 Tegn graf for tæthedsfunktion (GeoGebra)', page: 126 },
      { title: '14.2 Tegn graf for fordelingsfunktion (GeoGebra)', page: 127 },
      { title: '14.3 Bestem sandsynligheder (GeoGebra)', page: 128 },
      { title: '14.4 Bestem sandsynligheder (Nspire)', page: 130 },
      { title: '14.5 Undersøg om data er normalfordelte', page: 132 },
      { title: '14.6 Bestem middelværdi og/eller spredning', page: 135 },
      { title: '14.7 Tjek om residualer er normalfordelte', page: 137 },
      { title: '14.8 Bestem konfidensinterval for hældning', page: 140 },
  ]},
  { chapter: '15. Differensligninger (Nspire)', page: 143, sections: [
      { title: '15.1 Bestem elementer i talfølge', page: 143 },
      { title: '15.2 Tegn punktplot', page: 146 },
      { title: '15.3 Tegn cobwebdiagram', page: 149 },
      { title: '15.4 Bestem fikspunkter', page: 150 },
      { title: '15.5 Undersøg om fikspunkt er stabilt', page: 152 },
      { title: '15.6 Bestem lukket form', page: 153 },
      { title: '15.7 Newton-Raphsons metode', page: 156 },
  ]},
  { chapter: 'Appendiks 1. Fra komma til punktum', page: 158, sections: [] },
];

// Build TOC
const tocEl = document.getElementById('toc');
toc.forEach(ch => {
  const item = document.createElement('div');
  item.className = 'chapter-item';

  const chLink = document.createElement('a');
  chLink.className = 'chapter-link';
  chLink.dataset.page = ch.page;
  chLink.innerHTML = `<span>${ch.chapter}</span><span class="pg">s. ${ch.page}</span>`;
  chLink.addEventListener('click', e => { e.preventDefault(); goToPage(ch.page); });
  item.appendChild(chLink);

  if (ch.sections.length > 0) {
    const secList = document.createElement('div');
    secList.className = 'section-list';
    ch.sections.forEach(sec => {
      const sLink = document.createElement('a');
      sLink.className = 'section-link';
      sLink.dataset.page = sec.page;
      sLink.innerHTML = `<span>${sec.title}</span><span class="pg">s. ${sec.page}</span>`;
      sLink.addEventListener('click', e => { e.preventDefault(); goToPage(sec.page); });
      secList.appendChild(sLink);
    });
    item.appendChild(secList);
  }

  tocEl.appendChild(item);
});

// PDF.js
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc    = null;
let currentPage = 1;
let bookMode  = false;
let userScale = null; // null = auto fit
let rendering = false;
let pendingPage = null;

const canvas    = document.getElementById('pdf-canvas');
const ctx       = canvas.getContext('2d');
const container = document.getElementById('canvas-container');
const pageInput = document.getElementById('page-input');
const pageInfo  = document.getElementById('page-info');
const zoomLabel = document.getElementById('zoom-label');
const btnPrev   = document.getElementById('btn-prev');
const btnNext   = document.getElementById('btn-next');
const btnSingle = document.getElementById('btn-single');
const btnBook   = document.getElementById('btn-book');

// In book mode, snap to the start of a spread: page 1 alone, then 2-3, 4-5 ...
function spreadStart(n) {
  if (!bookMode || n <= 1) return n;
  return n % 2 === 0 ? n : n - 1; // even pages start a spread
}

async function renderPage(num) {
  if (rendering) { pendingPage = num; return; }
  rendering = true;

  num = spreadStart(num);
  currentPage = num;
  pageInput.value = num;
  btnPrev.disabled = num <= 1;
  history.replaceState(null, '', '#page=' + num);
  updateActiveLinks(num);

  const page1 = await pdfDoc.getPage(num);
  const base  = page1.getViewport({ scale: 1 });

  const showTwo = bookMode && num + 1 <= pdfDoc.numPages;
  const page2   = showTwo ? await pdfDoc.getPage(num + 1) : null;

  const totalW = base.width * (showTwo ? 2 : 1);
  const availW = container.clientWidth  - 32;
  const availH = container.clientHeight - 32;
  const scale  = userScale !== null
    ? userScale
    : Math.min(availW / totalW, availH / base.height);

  const vp1 = page1.getViewport({ scale });
  canvas.width  = showTwo ? Math.round(vp1.width * 2) : vp1.width;
  canvas.height = vp1.height;

  // Clear canvas (gap between pages in book mode)
  ctx.fillStyle = '#888';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  await page1.render({ canvasContext: ctx, viewport: vp1 }).promise;

  if (page2) {
    const vp2 = page2.getViewport({ scale });
    // Render page2 to offscreen canvas, then draw onto main canvas
    const off = document.createElement('canvas');
    off.width  = vp2.width;
    off.height = vp2.height;
    await page2.render({ canvasContext: off.getContext('2d'), viewport: vp2 }).promise;
    ctx.drawImage(off, vp1.width, 0);
  }

  btnNext.disabled = bookMode
    ? num + (showTwo ? 2 : 1) > pdfDoc.numPages
    : num >= pdfDoc.numPages;

  zoomLabel.textContent = Math.round(scale * 100) + '%';
  rendering = false;

  if (pendingPage !== null) {
    const p = pendingPage; pendingPage = null; renderPage(p);
  }
}

function goToPage(num) {
  if (!pdfDoc) return;
  num = Math.max(1, Math.min(pdfDoc.numPages, num));
  renderPage(num);
  container.scrollTop = 0;
}

function updateActiveLinks(page) {
  const allLinks = Array.from(document.querySelectorAll('[data-page]'));
  allLinks.forEach(el => el.classList.remove('active'));
  let best = 0, bestEls = [];
  allLinks.forEach(el => {
    const p = parseInt(el.dataset.page);
    if (p <= page) {
      if (p > best)       { best = p; bestEls = [el]; }
      else if (p === best)  bestEls.push(el);
    }
  });
  bestEls.forEach(el => {
    el.classList.add('active');
    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });
}

function updateModeButtons() {
  btnSingle.classList.toggle('active', !bookMode);
  btnBook.classList.toggle('active',  bookMode);
}

// Load PDF
pdfjsLib.getDocument(PDF_URL).promise.then(doc => {
  pdfDoc = doc;
  pageInfo.textContent = '/ ' + doc.numPages;
  pageInput.max = doc.numPages;
  const hash = window.location.hash.match(/page=(\d+)/);
  updateModeButtons();
  goToPage(hash ? parseInt(hash[1]) : 1);
}).catch(err => {
  container.innerHTML = '<p style="color:#f88;padding:20px;font-size:14px;">Kunne ikke indlæse PDF: ' + err.message + '</p>';
});

// Navigation
btnPrev.addEventListener('click', () => {
  const step = bookMode && currentPage > 1 ? 2 : 1;
  goToPage(currentPage - step);
});
btnNext.addEventListener('click', () => {
  const step = bookMode ? 2 : 1;
  goToPage(currentPage + step);
});
pageInput.addEventListener('change', () => goToPage(parseInt(pageInput.value)));
pageInput.addEventListener('keydown', e => { if (e.key === 'Enter') goToPage(parseInt(pageInput.value)); });

document.addEventListener('keydown', e => {
  if (e.target === pageInput) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') btnNext.click();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   btnPrev.click();
});

// View mode toggle
btnSingle.addEventListener('click', () => {
  if (bookMode) { bookMode = false; updateModeButtons(); userScale = null; renderPage(currentPage); }
});
btnBook.addEventListener('click', () => {
  if (!bookMode) { bookMode = true; updateModeButtons(); userScale = null; renderPage(currentPage); }
});

// Zoom
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  userScale = Math.min((userScale || parseFloat(zoomLabel.textContent) / 100) + 0.15, 3.0);
  renderPage(currentPage);
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  userScale = Math.max((userScale || parseFloat(zoomLabel.textContent) / 100) - 0.15, 0.2);
  renderPage(currentPage);
});
document.getElementById('btn-zoom-fit').addEventListener('click', () => {
  userScale = null; renderPage(currentPage);
});

// Resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (pdfDoc && userScale === null) renderPage(currentPage); }, 200);
});
</script>
</body>
</html>
